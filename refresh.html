<!doctype html>
<html lang="en-ZA">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex" />
  <title>Refreshing PFM Broadcasts</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --pfm-blue: #001c52;
      --pfm-blue-2: #07398f;
      --pfm-gold: #ffc400;
      --ink: #101828;
      --muted: #667085;
      --line: #d8e0ee;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(132deg, transparent 0 78%, rgba(255,196,0,.92) 78% 83%, transparent 83% 100%) top right / min(580px, 100vw) 260px no-repeat,
        radial-gradient(circle at top left, rgba(7,57,143,.12), transparent 32rem),
        linear-gradient(180deg, #ffffff 0%, #f5f7fb 100%);
      color: var(--ink);
    }

    .card {
      width: min(520px, 100%);
      padding: 28px;
      border: 1px solid rgba(216,224,238,.95);
      border-radius: 28px;
      background: rgba(255,255,255,.94);
      box-shadow: 0 24px 70px rgba(0, 28, 82, .14);
    }

    h1 {
      margin: 0 0 10px;
      color: var(--pfm-blue);
      font-size: clamp(32px, 8vw, 52px);
      line-height: .95;
      letter-spacing: -.05em;
    }

    p {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 12px 18px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--pfm-blue-2), var(--pfm-blue));
      color: #fff;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 13px 26px rgba(0, 28, 82, .18);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Refreshing the app</h1>
    <p>PFM Broadcasts is clearing old cached files so the latest admin tools can load, including video uploads.</p>
    <p>If you were seeing the old Broadcast Center form, open the app again after this page finishes loading.</p>
    <a href="./#admin">Open PFM Broadcasts</a>
  </main>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => Promise.all(regs.map(r => r.unregister()))).catch(() => {});
    }
    if ('caches' in window) {
      caches.keys().then(keys => Promise.all(keys.map(key => caches.delete(key)))).catch(() => {});
    }
    localStorage.removeItem('pfm_imgs');
    sessionStorage.removeItem('pfm_ad');
    setTimeout(() => {
      location.replace('./#admin');
    }, 1800);
  </script>
</body>
</html>
